<!DOCTYPE html>
<html>

<head>

    <title>LeadFlow AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="text-center mb-4">

LeadFlow AI

</h2>

<form action="/submit" method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
class="form-control"
name="name"
required>

</div>

<div class="mb-3">

<label>Phone</label>

<input
type="text"
class="form-control"
name="phone"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
class="form-control"
name="email"
required>

</div>

<div class="mb-3">

<label>Event Type</label>

<select
class="form-select"
name="event_type">

<option>Wedding</option>

<option>Birthday</option>

<option>Corporate</option>

<option>Engagement</option>

<option>Other</option>

</select>

</div>

<div class="mb-3">

<label>Guests</label>

<input
type="number"
class="form-control"
name="guests">

</div>

<div class="mb-3">

<label>Budget</label>

<input
type="number"
class="form-control"
name="budget">

</div>

<div class="mb-3">

<label>Event Date</label>

<input
type="date"
class="form-control"
name="event_date">

</div>

<div class="mb-3">

<label>Requirements</label>

<textarea
class="form-control"
rows="3"
name="requirements"></textarea>

</div>

<button
class="btn btn-primary w-100">

Submit Enquiry

</button>

</form>

</div>

</div>

</body>

</html>
